<body>
    
    <div id="app">
                    
            <!-- Toast 提示组件 -->
            <toast></toast>
        <!-- 整体居中 wrapper -->
            <div class="notebook-wrapper">
                <!-- 主体容器 -->

                <!-- 目录菜单组件 -->
                <toc-menu :title="title" :cells="cells" @scroll-to="scrollToSection"></toc-menu>

                <div class="notebook-container">
                    <!-- 头部 -->
                    <div class="notebook-header">
                        <h1>{{ title }}</h1>
                        <div class="meta">
                            <span>📅 {{ createdAt }}</span>
                        </div>
                    </div>
                    
                    <!-- 内容区域 -->
                    <cell-renderer 
                        v-for="(cell, index) in cells" 
                        :key="index"
                        :cell="cell"
                        :cell-id="index"
                        :level="0">
                    </cell-renderer>
                </div>

            </div>

            
            <!-- 配色器组件 -->
            <color-picker></color-picker>
        </div>
    

    <!-- Notebook Vue3 JS -->
    <script src="https://cdn.jsdelivr.net/gh/livepu/ft2@master/template/js/notebook3D.js"></script>
    <script>
        // 从 Jinja2 注入的数据创建配置
        const dataElement = document.getElementById('notebook-data');
        window.notebookConfig = dataElement ? JSON.parse(dataElement.textContent) : {
            title: '未命名 Notebook',
            createdAt: new Date().toLocaleString(),
            cells: []
        };
        
        // 创建并挂载应用
        createNotebookApp().mount('#app');
    </script>
</body>
